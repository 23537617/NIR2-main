version: '3.8'

services:
  chaincode-server:
    build:
      context: ./chaincode-ts
      dockerfile: Dockerfile
    container_name: chaincode-server
    image: chaincode-ts:latest
    ports:
      - "9999:9999"
    environment:
      - CHAINCODE_SERVER_ADDRESS=0.0.0.0:9999
      - CHAINCODE_ID=taskdocument_1.0:4f7015314b669a867c720d1f72f830cc9679fc592678bb506c00b9c6ff33aa7b
      - CORE_CHAINCODE_ID_NAME=taskdocument_1.0:4f7015314b669a867c720d1f72f830cc9679fc592678bb506c00b9c6ff33aa7b
      - CORE_PEER_ADDRESS=0.0.0.0:9999
      - CORE_PEER_TLS_ENABLED=false
    networks:
      - fabric-network
    restart: unless-stopped

networks:
  fabric-network:
    external: true
    name: nir2-main_fabric-network
